<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stumble Guys Hub</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <!-- The 'sandbox' attribute prevents the game from redirecting your main page -->
    <iframe 
        src="https://stumbleguys.com" 
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals"
        allow="autoplay; fullscreen; keyboard"
        allowfullscreen>
    </iframe>

</body>
</html>
