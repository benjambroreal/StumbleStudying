<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- This specific combination stops redirects while keeping the game playable -->
    <iframe 
        src="https://stumbleguys.com/play" 
        sandbox="allow-scripts allow-same-origin allow-forms"
        allow="autoplay; fullscreen; keyboard"
        allowfullscreen>
    </iframe>

</body>
</html>
