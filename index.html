<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; height: 100vh; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Floating Toggle Button */
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
        }

        .toggle-btn {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 2px solid #555;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            background: #222;
            border-color: #888;
        }

        /* Changes the button look when active */
        .toggle-btn.active {
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="lockToggle" class="toggle-btn">Cursor Lock: OFF</button>
    </div>

    <iframe id="gameFrame" src="https://stumbleguys.com/play" 
        sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock" 
        allow="autoplay; fullscreen; keyboard; pointer-lock" 
        allowfullscreen>
    </iframe>

    <script>
        const frame = document.getElementById('gameFrame');
        const lockBtn = document.getElementById('lockToggle');
        let isLockEnabled = false;

        // 1. Handle Toggle Button Click
        lockBtn.addEventListener('click', (e) => {
            isLockEnabled = !isLockEnabled;
            
            if (isLockEnabled) {
                lockBtn.textContent = "Cursor Lock: ON";
                lockBtn.classList.add('active');
                document.body.requestPointerLock();
            } else {
                lockBtn.textContent = "Cursor Lock: OFF";
                lockBtn.classList.remove('active');
                document.exitPointerLock();
            }
            
            // Stops this click from triggering the "body" listener below
            e.stopPropagation();
        });

        // 2. Lock cursor on background click (only if toggle is ON)
        document.body.addEventListener('click', () => {
            if (isLockEnabled) {
                document.body.requestPointerLock();
            }
        });

        // 3. Keep focus in the game when locked
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                frame.focus();
            }
        });
    </script>
</body>
</html>
