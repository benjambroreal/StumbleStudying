<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stumble Guys Online</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            color: white;
        }
        .game-container {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16 / 9;
            margin-top: 20px;
            border: 5px solid #333;
            border-radius: 10px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Stumble Guys</h1>
    <div class="game-container">
        <!-- Official Game Embed -->
        <iframe src="https://stumbleguys.com" allowfullscreen></iframe>
    </div>
    <p>Use your arrow keys or WASD to move!</p>
</body>
</html>
